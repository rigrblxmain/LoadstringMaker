<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XEC V2 | loadstring maker</title>
    <style>
        :root { --bg: #050505; --accent: #00ffaa; --border: #222; --text-dim: #888; --input-bg: #000; }
        body { background: var(--bg); color: #eee; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .wrapper { width: 700px; margin-top: 40px; }
        
        /* Language Toggle */
        .lang-switcher { margin-bottom: 15px; display: flex; gap: 8px; justify-content: flex-end; width: 100%; }
        .lang-btn { background: transparent; border: 1px solid #333; color: #666; padding: 4px 10px; cursor: pointer; font-size: 10px; border-radius: 2px; text-transform: uppercase; }
        .lang-btn.active { border-color: var(--accent); color: var(--accent); }

        .header-title { font-size: 16px; font-weight: bold; letter-spacing: 2px; color: #fff; margin-bottom: 25px; text-transform: uppercase; text-align: center; }
        .section { margin-bottom: 20px; width: 100%; }
        .label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .box-style { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 2px; box-sizing: border-box; padding: 12px; font-family: 'Consolas', monospace; font-size: 12px; color: #ccc; outline: none; resize: none; }
        .btn-accent { border: 1px solid var(--accent); color: var(--accent); background: transparent; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-accent:hover { background: var(--accent); color: #000; }
        #status { font-size: 10px; color: var(--accent); margin-top: 10px; font-family: monospace; }
        .lock-panel { background: #0a0a0a; border: 1px solid #333; padding: 20px; border-radius: 4px; text-align: center; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="lang-switcher">
            <button class="lang-btn active" onclick="setLang('en', this)">EN</button>
            <button class="lang-btn" onclick="setLang('cn', this)">CN</button>
        </div>

        <div class="header-title" id="main-title">XEC V2 | loadstring maker</div>

        <div id="lock-screen" class="lock-panel">
            <div class="label" id="lbl-unlock">Enter Access Key</div>
            <input type="password" id="user-key" class="box-style" style="text-align: center; margin-bottom: 10px;" placeholder="••••••••">
            <button class="btn-accent" id="btn-unlock" onclick="unlock()">Unlock Tool</button>
        </div>

        <div id="main-content" style="display: none;">
            <div class="section">
                <div class="label" id="lbl-file">File name</div>
                <input type="text" id="project-name" class="box-style" style="height: 40px;" placeholder="hi">
            </div>

            <div class="section">
                <div class="label" id="lbl-source">Source Code</div>
                <textarea id="source" class="box-style" style="height: 200px;" placeholder='-- Codes here'></textarea>
                <button class="btn-accent" id="btn-deploy" onclick="deploy()">Deploy to Account</button>
                <div id="status"></div>
            </div>

            <div class="section">
                <div class="label" id="lbl-output">Output</div>
                <textarea id="output" class="box-style" style="height: 60px; color: var(--accent);" readonly placeholder="Resulting loadstring..."></textarea>
            </div>
        </div>
    </div>

    <script>
        // --- SETTINGS ---
        const MASTER_TOKEN = "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"; 
        const FRIENDS_KEY = "Xec-V2_On-Top"; 

        const langData = {
            en: {
                unlock: "Enter Access Key",
                unlockBtn: "Enter",
                file: "File Name",
                filePH: "hi",
                source: "Source Code",
                sourcePH: "-- HelloWorld(!print!)",
                deploy: "Deploy to Account",
                output: "Output",
                wrongKey: "Invalid Access Key!",
                working: "> Building & Posting...",
                success: "> SUCCESS: Live link generated.",
                error: "> ERROR: Check token or connection."
            },
            cn: {
                unlock: "输入密钥",
                unlockBtn: "进入",
                file: "文件名称",
                filePH: "我好帅啊",
                source: "源码",
                sourcePH: "-- HelloWorld(!print!)",
                deploy: "输入",
                output: "输出",
                wrongKey: "密钥错误",
                working: "> 正在混肴+上传...",
                success: "> 链接已生成",
                error: "> 错误：请检查网络"
            }
        };

        let currentLang = 'en';

        function setLang(lang, btn) {
            currentLang = lang;
            const d = langData[lang];
            
            document.getElementById('lbl-unlock').innerText = d.unlock;
            document.getElementById('btn-unlock').innerText = d.unlockBtn;
            document.getElementById('lbl-file').innerText = d.file;
            document.getElementById('project-name').placeholder = d.filePH;
            document.getElementById('lbl-source').innerText = d.source;
            document.getElementById('source').placeholder = d.sourcePH;
            document.getElementById('btn-deploy').innerText = d.deploy;
            document.getElementById('lbl-output').innerText = d.output;

            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function unlock() {
            const input = document.getElementById('user-key').value;
            if (input === FRIENDS_KEY) {
                document.getElementById('lock-screen').style.display = "none";
                document.getElementById('main-content').style.display = "block";
            } else {
                alert(langData[currentLang].wrongKey);
            }
        }

        async function deploy() {
            const status = document.getElementById('status');
            const src = document.getElementById('source').value;
            const projName = document.getElementById('project-name').value || "Xec_" + Math.floor(Math.random() * 999);
            const fileName = projName + ".lua";

            if (!src) return;
            status.innerText = langData[currentLang].working;

            // XOR Obfuscation (Your specified logic)
            const k = [105, 72, 130];
            const bytes = new TextEncoder().encode(src);
            let hex = "";
            for (let i = 0; i < bytes.length; i++) { 
                hex += (bytes[i] ^ k[i % 3]).toString(16).padStart(2, '0'); 
            }

            const obfuscated = `--[[ XEC ]] local _v="${hex}";local _k={105,72,130};local _b={};for i=1,#_v,2 do table.insert(_b,string.char(bit32.bxor(tonumber(_v:sub(i,i+1),16),_k[(math.ceil(i/2)-1)%#_k+1]))) end;loadstring(table.concat(_b))();`;

            try {
                const response = await fetch("https://api.github.com/gists", {
                    method: "POST",
                    headers: { "Authorization": `token ${MASTER_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        "description": "Friend Deployment: " + projName,
                        "public": false,
                        "files": { [fileName]: { "content": obfuscated } }
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    const rawUrl = data.files[fileName].raw_url;
                    document.getElementById('output').value = `loadstring(game:HttpGet("${rawUrl}", true))()`;
                    status.innerText = langData[currentLang].success;
                } else {
                    status.innerText = langData[currentLang].error;
                }
            } catch (e) {
                status.innerText = langData[currentLang].error;
            }
        }
    </script>
</body>
</html>
