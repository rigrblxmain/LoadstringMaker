<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XEC V2 | loadstring maker</title>
    <style>
        :root { --bg: #050505; --accent: #00ffaa; --border: #222; --text-dim: #888; --input-bg: #000; }
        body { background: var(--bg); color: #eee; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .wrapper { width: 700px; margin-top: 40px; transition: margin-right 0.3s; position: relative; }
        
        /* Language Toggle */
        .lang-switcher { margin-bottom: 15px; display: flex; gap: 8px; justify-content: flex-end; width: 100%; }
        .lang-btn { background: transparent; border: 1px solid #333; color: #666; padding: 4px 10px; cursor: pointer; font-size: 10px; border-radius: 2px; text-transform: uppercase; }
        .lang-btn.active { border-color: var(--accent); color: var(--accent); }

        .header-title { font-size: 16px; font-weight: bold; letter-spacing: 2px; color: #fff; margin-bottom: 5px; text-transform: uppercase; text-align: center; }
        
        /* --- GREETING STYLE --- */
        #greeting-display { font-size: 14px; color: var(--accent); margin-bottom: 25px; text-align: center; font-weight: 500; height: 20px; }

        .section { margin-bottom: 20px; width: 100%; }
        .label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .box-style { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 2px; box-sizing: border-box; padding: 12px; font-family: 'Consolas', monospace; font-size: 12px; color: #ccc; outline: none; resize: none; }
        
        .btn-accent { border: 1px solid var(--accent); color: var(--accent); background: transparent; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-accent:hover { background: var(--accent); color: #000; }
        .btn-accent:disabled { border-color: #333; color: #333; cursor: not-allowed; }

        #console-container { width: 100%; height: 220px; background: #000; border: 1px solid var(--border); border-radius: 4px; padding: 15px; box-sizing: border-box; overflow-y: auto; margin-top: 15px; font-family: 'Consolas', monospace; font-size: 13px; color: #ccc; white-space: pre-wrap; }
        #output { color: var(--accent) !important; font-weight: bold; }

        /* Sidebar */
        #sidebar { position: fixed; right: -300px; top: 0; width: 300px; height: 100%; background: #080808; border-left: 1px solid var(--border); transition: 0.3s; padding: 20px; box-sizing: border-box; z-index: 999; }
        #sidebar.open { right: 0; }
        .sidebar-toggle { position: absolute; left: -40px; top: 50%; transform: translateY(-50%); width: 40px; height: 80px; background: #080808; border: 1px solid var(--border); border-right: none; color: var(--accent); display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 10px 0 0 10px; font-size: 20px; }

        #history-list { height: calc(100% - 40px); overflow-y: auto; margin-top: 10px; }
        .history-item { background: #000; border: 1px solid #333; padding: 12px; margin-bottom: 10px; cursor: pointer; position: relative; }
        .history-item:hover { border-color: var(--accent); }
        .history-item strong { color: var(--accent); display: block; font-size: 11px; }

        #confirm-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; }
        .modal-box { background: #0a0a0a; border: 1px solid #333; padding: 25px; width: 300px; text-align: center; }
    </style>
</head>
<body>

    <div id="confirm-modal">
        <div class="modal-box">
            <div class="label" style="color:#ff4444; margin-bottom:15px;">Delete Cloud Data?</div>
            <button class="btn-accent" style="border-color:#ff4444; color:#ff4444;" onclick="confirmDelete()">CONFIRM</button>
            <button class="btn-accent" style="border-color:#666; color:#666;" onclick="closeModal()">CANCEL</button>
        </div>
    </div>

    <div class="wrapper">
        <div class="lang-switcher">
            <button class="lang-btn active" onclick="setLang('en', this)">EN</button>
            <button class="lang-btn" onclick="setLang('cn', this)">CN</button>
        </div>
        <div class="header-title">XEC V2 | loadstring maker</div>
        
        <div id="greeting-display"></div>

        <div id="lock-screen" class="lock-panel">
            <div class="label" id="lbl-unlock">Enter Account Key</div>
            <input type="password" id="user-key" class="box-style" style="text-align: center; margin-bottom: 10px;" placeholder="••••••••">
            <button class="btn-accent" id="btn-unlock" onclick="unlock()">Login</button>
        </div>

        <div id="main-content" style="display: none;">
            <div class="section">
                <div class="label" id="lbl-file">File name</div>
                <input type="text" id="project-name" class="box-style" style="height: 40px;" placeholder="hi">
            </div>
            <div class="section">
                <div class="label" id="lbl-source">Source Code</div>
                <textarea id="source" class="box-style" style="height: 200px;" placeholder='-- Codes here'></textarea>
                <button class="btn-accent" id="btn-deploy" onclick="deploy()">Deploy to Account</button>
            </div>
            <div class="section">
                <div class="label" id="lbl-output">Terminal / Output</div>
                <div id="console-container">System Ready...</div>
            </div>
        </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-toggle" onclick="toggleSidebar()">«</div>
        <div class="label" id="side-label">History</div>
        <div id="history-list"></div>
    </div>
